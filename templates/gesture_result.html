<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Nhận Diện Cử Chỉ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }

        .header {
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 3px solid #00d4ff;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            color: #00d4ff;
            text-shadow: 0 2px 15px rgba(0, 212, 255, 0.3);
            margin-bottom: 5px;
        }

        .header p {
            color: #aaa;
            font-size: 0.95em;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .result-card {
            background: rgba(20, 30, 60, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
            min-width: 400px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-icon {
            font-size: 5em;
            margin-bottom: 30px;
            animation: pulse 1s ease-in-out infinite;
        }

        .result-icon.success {
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .result-icon.failure {
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .result-text {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-text.success {
            color: #00ff88;
        }

        .result-text.failure {
            color: #ff4444;
        }

        .gesture-info {
            background: rgba(0, 212, 255, 0.1);
            border-left: 4px solid #00d4ff;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            text-align: left;
        }

        .gesture-label {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .gesture-value {
            font-size: 1.3em;
            color: #00ff88;
            font-weight: bold;
            text-transform: uppercase;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.85em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: 2px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            font-size: 1em;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #00d4ff;
            color: #0a0e27;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn.secondary {
            border-color: #666;
            color: #666;
        }

        .btn.secondary:hover {
            background: #666;
            color: #fff;
            box-shadow: 0 0 15px rgba(100, 100, 100, 0.3);
        }

        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history {
            margin-top: 40px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-title {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-item {
            background: rgba(0, 212, 255, 0.05);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 3px solid #00d4ff;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
        }

        .history-item.success {
            border-left-color: #00ff88;
            color: #00ff88;
        }

        .history-item.failure {
            border-left-color: #ff4444;
            color: #ff4444;
        }

        @media (max-width: 600px) {
            .result-card {
                min-width: 90%;
                padding: 40px 30px;
            }

            .result-icon {
                font-size: 3em;
            }

            .result-text {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖐️ Nhận Diện Cử Chỉ Tay</h1>
        <p>Sử dụng camera để điều khiển</p>
    </div>

    <div class="container">
        <div id="content"></div>
    </div>

    <script>
        let detectionHistory = [];
        let successCount = 0;
        let failureCount = 0;

        async function pollGestures() {
            try {
                // Send request to gesture detection (no frame needed - server captures from camera)
                const response = await fetch('/api/gesture-only', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });

                const result = await response.json();
                
                if (result) {
                    const gesture = result.gesture || 'none';
                    const confidence = result.num_hands > 0 ? (result.confidence * 100).toFixed(1) : 0;
                    
                    // Determine if successful (detected gesture other than 'none')
                    const isSuccess = gesture !== 'none' && result.num_hands > 0;
                    
                    // Update UI
                    updateUI(isSuccess, gesture, confidence, result.num_hands);
                    
                    // Add to history
                    addToHistory(gesture, isSuccess, confidence, result.num_hands);
                }
            } catch (error) {
                console.error('Polling error:', error);
            }

            // Poll every 1 second
            setTimeout(pollGestures, 1000);
        }

        function updateUI(isSuccess, gesture, confidence, handCount) {
            const content = document.getElementById('content');
            
            if (isSuccess) {
                successCount++;
                content.innerHTML = `
                    <div class="result-card">
                        <div class="result-icon success">✅</div>
                        <div class="result-text success">Thành Công</div>
                        <div class="gesture-info">
                            <div class="gesture-label">Cử chỉ được phát hiện:</div>
                            <div class="gesture-value">${gesture.replace(/_/g, ' ').toUpperCase()}</div>
                            <div class="gesture-label" style="margin-top: 15px;">Chi tiết:</div>
                            <div style="font-size: 0.95em; color: #00d4ff; margin-top: 8px;">
                                📍 Tay: ${handCount}<br>
                                📊 Độ tin cậy: ${confidence}%
                            </div>
                        </div>
                        <div class="stats">
                            <div class="stat-box">
                                <div class="stat-label">Thành Công</div>
                                <div class="stat-value" style="color: #00ff88;">${successCount}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Thất Bại</div>
                                <div class="stat-value" style="color: #ff4444;">${failureCount}</div>
                            </div>
                        </div>
                        <div class="controls">
                            <button class="btn" onclick="resetStats()">Đặt Lại</button>
                            <button class="btn secondary" onclick="goBack()">Quay Lại</button>
                        </div>
                    </div>
                `;
            } else if (handCount > 0) {
                failureCount++;
                content.innerHTML = `
                    <div class="result-card">
                        <div class="result-icon failure">❌</div>
                        <div class="result-text failure">Thất Bại</div>
                        <div class="gesture-info">
                            <div class="gesture-label">Cử chỉ không được nhận diện</div>
                            <div class="gesture-value">Thử Lại</div>
                            <div class="gesture-label" style="margin-top: 15px;">Gợi ý:</div>
                            <div style="font-size: 0.95em; color: #aaa; margin-top: 8px;">
                                • Di chuyển tay chậm hơn<br>
                                • Tăng ánh sáng<br>
                                • Đặt tay gần camera hơn
                            </div>
                        </div>
                        <div class="stats">
                            <div class="stat-box">
                                <div class="stat-label">Thành Công</div>
                                <div class="stat-value" style="color: #00ff88;">${successCount}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Thất Bại</div>
                                <div class="stat-value" style="color: #ff4444;">${failureCount}</div>
                            </div>
                        </div>
                        <div class="controls">
                            <button class="btn" onclick="resetStats()">Đặt Lại</button>
                            <button class="btn secondary" onclick="goBack()">Quay Lại</button>
                        </div>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="result-card">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div style="font-size: 1.2em; color: #aaa;">Đang tìm kiếm tay...</div>
                            <div style="font-size: 0.9em; color: #666;">
                                Đặt tay trước camera
                            </div>
                        </div>
                    </div>
                `;
            }

            // Show history if available
            if (detectionHistory.length > 0) {
                const historyHtml = `
                    <div class="history">
                        <div class="history-title">Lịch Sử Gần Đây</div>
                        ${detectionHistory.slice(-5).reverse().map(item => `
                            <div class="history-item ${item.success ? 'success' : 'failure'}">
                                <span>${item.gesture} (${item.confidence}%)</span>
                                <span>${item.success ? '✅' : '❌'}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                content.innerHTML += historyHtml;
            }
        }

        function addToHistory(gesture, isSuccess, confidence, handCount) {
            if (handCount > 0) {
                detectionHistory.push({
                    gesture: gesture.replace(/_/g, ' '),
                    success: isSuccess,
                    confidence: confidence,
                    timestamp: new Date().toLocaleTimeString('vi-VN')
                });

                // Keep only last 20 items
                if (detectionHistory.length > 20) {
                    detectionHistory.shift();
                }
            }
        }

        function resetStats() {
            successCount = 0;
            failureCount = 0;
            detectionHistory = [];
            updateUI(false, 'none', 0, 0);
        }

        function goBack() {
            window.location.href = '/';
        }

        // Initial UI
        updateUI(false, 'none', 0, 0);

        // Start polling for gestures
        pollGestures();
    </script>
</body>
</html>
