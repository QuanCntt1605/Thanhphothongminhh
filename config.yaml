# Cấu hình hệ thống bảng thông tin
# Configuration file for gesture-controlled public display

# Cài đặt màn hình
display_width: 1280
display_height: 720
font_scale: 1.0

# Cài đặt camera
camera_width: 640
camera_height: 480
camera_fps: 30
camera_preview_width: 320
camera_preview_height: 240
camera_id: 0

# Cài đặt MediaPipe
min_detection_confidence: 0.5
min_tracking_confidence: 0.5
max_num_hands: 2

# Cài đặt gesture recognition
swipe_threshold: 50       # Pixel
zoom_threshold: 20        # Pixel
scroll_threshold: 30      # Pixel

# Thư mục dữ liệu
data_dir: data
